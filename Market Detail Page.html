function useCountdown(iso) {
  const calc = () => {
    const d = (new Date(iso)-Date.now())/1000;
    if(d<=0) return {h:'00',m:'00',s:'00',label:'Ended',ended:true};
    const dy=Math.floor(d/86400), h=Math.floor((d%86400)/3600), m=Math.floor((d%3600)/60), s=Math.floor(d%60);
    if(dy>0) return {h:String(dy).padStart(2,'0'),m:String(h).padStart(2,'0'),s:String(m).padStart(2,'0'),units:['DAYS','HRS','MINS'],ended:false};
    return {h:String(h).padStart(2,'0'),m:String(m).padStart(2,'0'),s:String(s).padStart(2,'0'),units:['HRS','MINS','SECS'],ended:false};
  };
  const [v,setV] = useState(calc);
  useEffect(()=>{ const id=setInterval(()=>setV(calc()),1000); return ()=>clearInterval(id); },[iso]);
  return v;
}

function useLivePrice(base) {
  const [price, setPrice] = useState(base*(0.97+Math.random()*0.06));
  const [history, setHistory] = useState(() => {
    const now = Date.now(); let p = base*(0.97+Math.random()*0.06); const pts = [];
    for(let i=24;i>=0;i--) { p+=( Math.random()-0.48)*base*0.003; pts.push({ts:now-i*35000,v:p}); }
    return pts;
  });
  const [probHistory] = useState(() => {
    let p=50; const pts=[];
    const labels=['13:00','13:05','13:10','13:15','13:20','13:25','13:30','13:35','13:40','13:45','13:50','13:55','14:00','14:05'];
    labels.forEach(t=>{ p+=(Math.random()-0.48)*3; pts.push({t,y:Math.min(90,Math.max(10,p))}); });
    return pts;
  });
  useEffect(()=>{
    const id=setInterval(()=>{
      setPrice(prev=>{
        const next=prev+(Math.random()-0.48)*base*0.003;
        setHistory(h=>[...h.slice(-39),{ts:Date.now(),v:next}]);
        return next;
      });
    },12000);
    return ()=>clearInterval(id);
  },[]);
  return {price,history,probHistory};
}

// ── Price Chart ──────────────────────────────────────────────────────────
function PriceChart({history, threshold, currentPrice}) {
  const W=800, H=200, PL=60, PR=20, PT=14, PB=28;
  if(!history||history.length<2) return null;
  const cw=W-PL-PR, ch=H-PT-PB;
  const vals=history.map(d=>d.v);
  const allVals=[...vals,threshold];
  const lo=Math.min(...allVals)*0.9985, hi=Math.max(...allVals)*1.0015;
  const px=i=>PL+(i/(history.length-1))*cw;
  const py=v=>PT+ch-((v-lo)/(hi-lo))*ch;
  const tyPx=py(threshold);
  const above=currentPrice>=threshold;
  const clr=above?T.yes:T.no;

  const linePath=history.map((d,i)=>`${i===0?'M':'L'}${px(i).toFixed(1)},${py(d.v).toFixed(1)}`).join(' ');
  const areaPath=linePath+` L${px(history.length-1)},${H-PB} L${PL},${H-PB} Z`;

  const range=hi-lo;
  const rawStep=range/5, mag=Math.pow(10,Math.floor(Math.log10(rawStep)));
  const step=Math.ceil(rawStep/mag)*mag;
  const firstTick=Math.ceil(lo/step)*step;
  const ticks=[];
  for(let v=firstTick;v<=hi;v+=step) ticks.push(parseFloat(v.toFixed(8)));

  const xLabels=history.filter((_,i)=>i%Math.max(1,Math.floor(history.length/5))===0);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:H,display:'block'}}>
      <defs>
        <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={clr} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={clr} stopOpacity="0"/>
        </linearGradient>
        <clipPath id="cc"><rect x={PL} y={PT} width={cw} height={ch}/></clipPath>
      </defs>
      {ticks.map(v=>(
        <line key={v} x1={PL} x2={W-PR} y1={py(v).toFixed(1)} y2={py(v).toFixed(1)} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
      ))}
      {/* Threshold */}
      <line x1={PL} x2={W-PR} y1={tyPx.toFixed(1)} y2={tyPx.toFixed(1)} stroke={T.muted} strokeWidth="1" strokeDasharray="5 4" opacity="0.6"/>
      <rect x={W-PR-52} y={tyPx-10} width={52} height={18} rx="4" fill={T.surfaceH} stroke={T.border}/>
      <text x={W-PR-26} y={tyPx+4} textAnchor="middle" fontSize="9" fill={T.muted} fontFamily={T.mono}>Target</text>
      {/* Area + line */}
      <g clipPath="url(#cc)">
        <path d={areaPath} fill="url(#pg)"/>
        <path d={linePath} stroke={clr} strokeWidth="2" fill="none"/>
        <circle cx={px(history.length-1).toFixed(1)} cy={py(history[history.length-1].v).toFixed(1)} r="4" fill={clr} stroke={T.bg} strokeWidth="2"/>
      </g>
      {ticks.map(v=>(
        <text key={`t${v}`} x={PL-7} y={py(v)+4} textAnchor="end" fontSize="9" fill={T.muted} fontFamily={T.mono}>${v.toFixed(5)}</text>
      ))}
      {xLabels.map((d,i)=>(
        <text key={i} x={px(history.indexOf(d)).toFixed(1)} y={H-7} textAnchor="middle" fontSize="9" fill={T.muted} fontFamily={T.mono}>
          {new Date(d.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
        </text>
      ))}
      <line x1={PL} x2={W-PR} y1={H-PB} y2={H-PB} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
    </svg>
  );
}

// ── Prob Chart ───────────────────────────────────────────────────────────
function ProbChart({data}) {
  const W=800, H=200, PL=44, PR=20, PT=14, PB=28;
  if(!data||data.length<2) return null;
  const cw=W-PL-PR, ch=H-PT-PB;
  const px=i=>PL+(i/(data.length-1))*cw;
  const py=v=>PT+ch-((v-0)/(100-0))*ch;
  const linePath=data.map((d,i)=>`${i===0?'M':'L'}${px(i).toFixed(1)},${py(d.y).toFixed(1)}`).join(' ');
  const areaPath=linePath+` L${px(data.length-1)},${H-PB} L${PL},${H-PB} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:H,display:'block'}}>
      <defs>
        <linearGradient id="probg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={T.yes} stopOpacity="0.22"/>
          <stop offset="100%" stopColor={T.yes} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0,25,50,75,100].map(v=>(
        <line key={v} x1={PL} x2={W-PR} y1={py(v)} y2={py(v)} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
      ))}
      <path d={areaPath} fill="url(#probg)"/>
      <path d={linePath} stroke={T.yes} strokeWidth="2" fill="none"/>
      <circle cx={px(data.length-1).toFixed(1)} cy={py(data[data.length-1].y).toFixed(1)} r="4" fill={T.yes} stroke={T.bg} strokeWidth="2"/>
      {[0,25,50,75,100].map(v=>(
        <text key={v} x={PL-7} y={py(v)+4} textAnchor="end" fontSize="9" fill={T.muted} fontFamily={T.mono}>{v}%</text>
      ))}
      {data.filter((_,i)=>i%3===0).map((d,idx)=>(
        <text key={idx} x={px(data.indexOf(d)).toFixed(1)} y={H-7} textAnchor="middle" fontSize="9" fill={T.muted} fontFamily={T.mono}>{d.t}</text>
      ))}
      <line x1={PL} x2={W-PR} y1={H-PB} y2={H-PB} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
    </svg>
  );
}

  const cd = useCountdown(iso);
  if(cd.ended) return <span style={{fontSize:11,fontWeight:700,color:T.muted,fontFamily:T.mono,textTransform:'uppercase',letterSpacing:'0.07em'}}>Ended</span>;
  return (
    <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
      {[cd.h,cd.m,cd.s].map((v,i)=>(
        <div key={i} style={{textAlign:'center'}}>
          <div style={{fontFamily:T.mono,fontSize:28,fontWeight:500,color:T.text,lineHeight:1,letterSpacing:'-0.02em'}}>{v}</div>
          <div style={{fontSize:8,color:T.muted,textTransform:'uppercase',letterSpacing:'0.12em',fontWeight:700,marginTop:3}}>{(cd.units||['HRS','MINS','SECS'])[i]}</div>
        </div>

    </div>
  );
}

        </div>

        {isSell && (
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:T.muted,marginBottom:10,padding:'7px 10px',borderRadius:7,background:T.surfaceH,border:`1px solid ${T.borderS}`}}>
            <span>You own</span>
            <span style={{fontFamily:T.mono,fontWeight:600,color:owned>0?T.text:T.muted}}>{owned.toFixed(2)} {side} shares</span>
          </div>
        )}

        {/* Amount */}
        <div style={{padding:'12px 14px',borderRadius:9,background:T.surfaceH,border:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <span style={{fontSize:12,color:T.muted,fontWeight:600}}>{isSell?'Shares':'Amount'}</span>
          <div style={{display:'flex',alignItems:'center',gap:3}}>
            {!isSell&&<span style={{fontSize:20,color:T.muted,fontFamily:T.mono}}>$</span>}
            <input type="number" min="0" placeholder="0" value={amt} onChange={e=>setAmt(e.target.value)}
              style={{width:88,background:'transparent',color:amt?T.text:'rgba(228,229,235,0.2)',fontSize:22,fontFamily:T.mono,fontWeight:500,textAlign:'right'}}/>
          </div>
        </div>

        {/* Quick amounts */}
        <div style={{display:'flex',gap:5,marginBottom:14}}>
          {[1,5,10,100,'Max'].map(q=>(
            <button key={q} onClick={()=>q==='Max'?setAmt('47.20'):setAmt(s=>String((parseFloat(s)||0)+q))}
              style={{flex:1,padding:'6px 0',borderRadius:6,fontSize:11,fontWeight:600,background:T.surfaceH,color:T.muted,border:`1px solid ${T.borderS}`,transition:'color 0.1s'}}
              onMouseEnter={e=>e.currentTarget.style.color=T.text}
              onMouseLeave={e=>e.currentTarget.style.color=T.muted}>
              {q==='Max'?'Max':`+$${q}`}
            </button>
          ))}
        </div>

        {/* Breakdown */}
        {num>0&&(
          <div style={{background:T.surfaceH,borderRadius:8,padding:'10px 13px',marginBottom:12,border:`1px solid ${T.borderS}`}}>
            {[
              ['Avg price',`${(price*100).toFixed(1)}¢`,''],
              ['Est. shares',shares.toFixed(2),''],
              ['Potential return',`$${(shares).toFixed(2)} (+${profit.toFixed(0)}%)`,'return'],
            ].map(([k,v,type],i)=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:i<2?6:0}}>
                <span style={{color:T.muted}}>{k}</span>
                <span style={{color:type==='return'?sideColor:T.text,fontFamily:T.mono,fontWeight:type==='return'?700:400}}>{v}</span>
              </div>
            ))}
          </div>
        )}

        {/* CTA */}
        {!connected
          ? <button onClick={onConnect} style={{width:'100%',padding:'13px',borderRadius:9,background:'#3b82f6',color:'#fff',fontSize:14,fontWeight:700}}>
              Connect Wallet to Trade
            </button>
          : <button style={{width:'100%',padding:'13px',borderRadius:9,fontSize:14,fontWeight:700,transition:'all 0.15s',
              background:btnActive?'#3b82f6':T.surfaceH,
              color:btnActive?'#fff':T.muted,
              cursor:btnActive?'pointer':'not-allowed',
            }}>
              {btnActive?`${mode==='BUY'?'Buy':'Sell'} ${side} · $${num.toFixed(2)}`:'Enter an amount'}
            </button>
        }
        <p style={{textAlign:'center',fontSize:10,color:T.muted,marginTop:9,lineHeight:1.5}}>
          By trading you agree to the <span style={{textDecoration:'underline',cursor:'pointer'}}>Terms of Use</span>
        </p>

        {/* Balance */}
        <div style={{display:'flex',justifyContent:'space-between',padding:'9px 12px',marginTop:6,borderRadius:8,background:T.surfaceH,border:`1px solid ${T.borderS}`}}>
          <span style={{fontSize:11,color:T.muted}}>Vault balance</span>
          <span style={{fontSize:11,color:T.yes,fontFamily:T.mono,fontWeight:600}}>$47.20</span>
        </div>
      </div>
    </div>
  );
}

// ── Resolved panel ────────────────────────────────────────────────────────
function ResolvedPanel({market}) {
  const won = market.result==='YES';
  return (
    <div className="card" style={{padding:28,textAlign:'center'}}>
      <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.muted,marginBottom:16}}>Market Resolved</div>
      <div style={{fontFamily:T.mono,fontSize:52,fontWeight:500,color:won?T.yes:T.no,lineHeight:1,marginBottom:14,letterSpacing:'-0.03em'}}>
        {market.result}
      </div>
      <div style={{width:48,height:48,borderRadius:'50%',background:won?`${T.yes}18`:`${T.no}18`,border:`1px solid ${won?T.yes:T.no}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
        {won
          ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><polyline points="4,12 9,17 20,7" stroke={T.yes} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          : <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><line x1="5" y1="5" x2="19" y2="19" stroke={T.no} strokeWidth="2.5" strokeLinecap="round"/><line x1="19" y1="5" x2="5" y2="19" stroke={T.no} strokeWidth="2.5" strokeLinecap="round"/></svg>
        }
      </div>
      <p style={{fontSize:12,color:T.muted,lineHeight:1.6,marginBottom:20}}>
        This market has been resolved.<br/>Winning shares can be redeemed in your portfolio.
      </p>
      <button style={{width:'100%',padding:'12px',borderRadius:9,background:T.surfaceH,border:`1px solid ${T.border}`,fontSize:13,fontWeight:700,color:T.text}}>
        View Portfolio →
      </button>
    </div>
  );
}

// ── Main Market Detail Page ───────────────────────────────────────────────
function MarketDetailPage({market, connected, setConnected, onBack}) {
  const [chartMode, setChartMode] = useState('price');
  const [tab, setTab] = useState('trades');
  const {price:livePrice, history, probHistory} = useLivePrice(market.threshold||0.08542);
  const above = livePrice >= (market.threshold||0.08542);
  const diff = livePrice - (market.threshold||0.08542);
  const yp = (market.yesPrice*100).toFixed(1);
  const np = (market.noPrice*100).toFixed(1);
  const isPrice = market.type==='price';
  const isResolved = market.resolved;

  return (
    <div data-screen-label="01 Market Detail">
      <Navbar onBack={onBack} connected={connected} setConnected={setConnected}/>
      <div className="fade-up" style={{maxWidth:1280,margin:'0 auto',padding:'28px 24px 64px'}}>

        {/* Breadcrumb */}
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:T.muted,marginBottom:22,transition:'color 0.12s',padding:'4px 0'}}
          onMouseEnter={e=>e.currentTarget.style.color=T.text}
          onMouseLeave={e=>e.currentTarget.style.color=T.muted}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="15,18 9,12 15,6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          All Markets
        </button>

        <div style={{display:'grid',gridTemplateColumns:'1fr 308px',gap:16,alignItems:'start'}}>
          {/* ── LEFT COLUMN ── */}
          <div style={{display:'flex',flexDirection:'column',gap:14}}>

            {/* Header card */}
            <div className="card" style={{padding:'22px 24px'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:16,marginBottom:20}}>
                {/* Icon + title */}
                <div style={{display:'flex',alignItems:'flex-start',gap:14,flex:1}}>
                  <div style={{width:42,height:42,borderRadius:11,background:`${T.yes}12`,border:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>
                    <NamIcon size={20}/>
                  </div>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                      <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.09em',padding:'2px 7px',borderRadius:4,
                        background:isResolved?'rgba(255,255,255,0.06)':`${T.accent}18`,
                        color:isResolved?T.muted:T.accent}}>
                        {isResolved?'Resolved':market.tag}
                      </span>
                      {!isResolved&&<span className="live"/>}
                      <span style={{fontSize:10,color:T.muted,fontFamily:T.mono}}>{market.cadence} cadence</span>
                    </div>
                    <h1 style={{fontSize:17,fontWeight:600,color:T.text,lineHeight:1.4,letterSpacing:'-0.01em',textWrap:'pretty',maxWidth:580}}>{market.question}</h1>
                  </div>
                </div>
                {/* Countdown or resolved badge */}
                <div style={{flexShrink:0}}>
                  {isResolved
                    ? <div style={{padding:'6px 14px',borderRadius:8,background:market.result==='YES'?`${T.yes}18`:`${T.no}18`,border:`1px solid ${market.result==='YES'?T.yes:T.no}`}}>
                        <span style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:market.result==='YES'?T.yes:T.no}}>{market.result}</span>
                      </div>
                    : <Countdown iso={market.endTime}/>
                  }
                </div>
              </div>

              {/* Stats row */}
              <div style={{display:'flex',gap:0,borderTop:`1px solid ${T.borderS}`,paddingTop:18}}>
                {isPrice&&[
                  {l:'Price to Beat', v:`$${market.threshold.toFixed(5)}`, c:T.text},
                  {l:'Current Price', v:`$${livePrice.toFixed(5)}`, c:above?T.yes:T.no,
                    badge: above?`▲ $${Math.abs(diff).toFixed(5)}`:`▼ $${Math.abs(diff).toFixed(5)}`,
                    badgeClr: above?T.yes:T.no},
                ].map((s,i)=>(
                  <div key={i} style={{marginRight:32}}>
                    <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:700,marginBottom:5,display:'flex',alignItems:'center',gap:6}}>
                      {s.l}
                      {s.badge&&<span style={{fontSize:9,fontWeight:700,color:s.badgeClr,background:`${s.badgeClr}18`,padding:'1px 5px',borderRadius:4,fontFamily:T.mono}}>{s.badge}</span>}
                    </div>
                    <div style={{fontFamily:T.mono,fontSize:18,fontWeight:500,color:s.c}}>{s.v}</div>
                  </div>
                ))}

                {/* Always shown stats */}
                <div style={{marginLeft:'auto',display:'flex',gap:24}}>
                  {[
                    {l:'YES chance', v:`${yp}%`, c:T.yes},
                    {l:'NO chance', v:`${np}%`, c:T.no},
                    {l:'Volume', v:fmtVol(market.volume), c:T.text},
                    {l:'Liquidity', v:fmtVol(market.liquidity), c:T.text},
                  ].map(s=>(
                    <div key={s.l}>
                      <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:700,marginBottom:5}}>{s.l}</div>
                      <div style={{fontFamily:T.mono,fontSize:14,color:s.c,fontWeight:500}}>{s.v}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Prob bar */}
              <div style={{marginTop:16}}>
                <ProbBar yes={parseFloat(yp)} h={5}/>
              </div>
            </div>

            {/* Chart card */}
            {!isResolved&&(
              <div className="card" style={{padding:'16px 20px 14px'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
                  <div style={{display:'flex',gap:3,padding:3,borderRadius:8,background:T.surfaceH,border:`1px solid ${T.border}`}}>
                    {[['price','NAM Price'],['prob','Probabilities']].map(([v,l])=>(
                      <button key={v} onClick={()=>setChartMode(v)} style={{
                        padding:'5px 14px',borderRadius:6,fontSize:11,fontWeight:600,transition:'all 0.12s',
                        background:chartMode===v?T.text:T.surfaceH,color:chartMode===v?T.bg:T.muted,border:'none',
                      }}>{l}</button>
                    ))}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    {chartMode==='price'
                      ? <>
                          <div style={{display:'flex',alignItems:'center',gap:5}}>
                            <div style={{width:20,height:2,borderRadius:1,background:above?T.yes:T.no}}/>
                            <span style={{fontSize:10,color:T.muted}}>NAM price</span>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:5}}>
                            <div style={{width:14,height:1,borderRadius:1,background:T.muted,borderTop:'1px dashed '+T.muted}}/>
                            <span style={{fontSize:10,color:T.muted}}>Target</span>
                          </div>
                        </>
                      : <>
                          <div style={{display:'flex',alignItems:'center',gap:5}}>
                            <div style={{width:20,height:2,borderRadius:1,background:T.yes}}/>
                            <span style={{fontSize:10,color:T.muted}}>YES probability</span>
                          </div>
                        </>
                    }
                  </div>
                </div>
                {chartMode==='price'
                  ? <PriceChart history={history} threshold={market.threshold||0.08542} currentPrice={livePrice}/>
                  : <ProbChart data={probHistory}/>
                }
              </div>
            )}

            {/* Tabs: Trades / About */}
            <div>
              <div style={{display:'flex',gap:4,marginBottom:12}}>
                {[['trades','Recent Trades'],['about','About']].map(([v,l])=>(
                  <button key={v} onClick={()=>setTab(v)} style={{
                    padding:'6px 16px',borderRadius:20,fontSize:12,fontWeight:600,transition:'all 0.12s',
                    background:tab===v?T.surfaceH:'transparent',color:tab===v?T.text:T.muted,
                    border:`1px solid ${tab===v?T.border:'transparent'}`,
                  }}>{l}</button>
                ))}
              </div>

              {tab==='trades'&&(
                <div className="card" style={{padding:'18px 20px'}}>
                  {/* Header row */}
                  <div style={{display:'grid',gridTemplateColumns:'110px 1fr 80px 80px 80px',gap:10,padding:'0 0 10px',borderBottom:`1px solid ${T.borderS}`,marginBottom:2}}>
                    {['Outcome','Trader','Shares','Amount','Time'].map(h=>(
                      <span key={h} style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:700}}>{h}</span>
                    ))}
                  </div>
                  {TRADES.map((tr,i)=>(
                    <div key={tr.id} style={{display:'grid',gridTemplateColumns:'110px 1fr 80px 80px 80px',gap:10,padding:'11px 0',borderBottom:i<TRADES.length-1?`1px solid ${T.borderS}`:'none',alignItems:'center'}}>
                      <span style={{fontSize:9,fontWeight:700,padding:'3px 8px',borderRadius:4,display:'inline-block',width:'fit-content',letterSpacing:'0.04em',
                        background:tr.side==='YES'?`${T.yes}18`:`${T.no}15`,
                        color:tr.side==='YES'?T.yes:T.no}}>
                        {tr.isBuy?'BUY':'SELL'} {tr.side}
                      </span>
                      <span style={{fontSize:11,color:T.muted,fontFamily:T.mono}}>{tr.trader}</span>
                      <span style={{fontSize:11,color:T.text,fontFamily:T.mono}}>{tr.shares.toFixed(1)}</span>
                      <span style={{fontSize:11,color:T.text,fontFamily:T.mono}}>${tr.amount}</span>
                      <span style={{fontSize:10,color:T.muted}}>{tr.ago} ago</span>
                    </div>
                  ))}
                </div>
              )}

              {tab==='about'&&(
                <div className="card" style={{padding:'20px 24px'}}>
                  <div style={{fontSize:13,color:T.text,lineHeight:1.75,marginBottom:20}}>{market.description}</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                    {[
                      {l:'Market Creator', v:market.creator},
                      {l:'Created', v:market.createdAt},
                      {l:'Resolution Source', v:'Numia Oracle / Osmosis DEX'},
                      {l:'Market ID', v:`#${market.id}`},
                    ].map(s=>(
                      <div key={s.l} style={{padding:'12px 14px',borderRadius:8,background:T.surfaceH,border:`1px solid ${T.borderS}`}}>
                        <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:700,marginBottom:4}}>{s.l}</div>
                        <div style={{fontSize:12,color:T.text,fontFamily:T.mono}}>{s.v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* ── RIGHT COLUMN ── */}
          <div style={{position:'sticky',top:70}}>
            {isResolved
              ? <ResolvedPanel market={market}/>
              : <TradePanel market={market} connected={connected} onConnect={()=>setConnected(true)}/>
            }

            {/* Market info mini-card */}
            <div className="card" style={{padding:'14px 16px',marginTop:10}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.09em',color:T.muted,marginBottom:12}}>Market Info</div>
              {[
                ['Yes price', `${(market.yesPrice*100).toFixed(1)}¢`, T.yes],
                ['No price', `${(market.noPrice*100).toFixed(1)}¢`, T.no],
                ['Volume', fmtVol(market.volume), T.text],
                ['Liquidity', fmtVol(market.liquidity), T.text],
                ['Created', market.createdAt, T.muted],
              ].map(([k,v,c])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${T.borderS}`}}>
                  <span style={{color:T.muted}}>{k}</span>
                  <span style={{fontFamily:T.mono,color:c}}>{v}</span>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
                <span style={{color:T.muted}}>Creator</span>
                <span style={{fontFamily:T.mono,color:T.muted}}>{market.creator}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Market Selector (demo nav) ────────────────────────────────────────────
function MarketSelector({current, onChange}) {
  return (
    <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:100,display:'flex',gap:8,padding:'10px 14px',borderRadius:12,background:T.surface,border:`1px solid ${T.border}`,boxShadow:'0 8px 32px rgba(0,0,0,0.5)',backdropFilter:'blur(12px)'}}>
      <span style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:700,alignSelf:'center',marginRight:4}}>Demo</span>
      {MARKET_VARIANTS.map(m=>(
        <button key={m.id} onClick={()=>onChange(m.id)} style={{
          padding:'5px 12px',borderRadius:7,fontSize:11,fontWeight:600,transition:'all 0.12s',
          background:current===m.id?T.text:T.surfaceH,
          color:current===m.id?T.bg:T.muted,
          border:`1px solid ${current===m.id?'transparent':T.border}`,
        }}>
          #{m.id} {m.tag}
          {m.resolved&&<span style={{fontSize:9,marginLeft:4,opacity:0.6}}>✓</span>}
        </button>
      ))}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const [marketId, setMarketId] = useState(()=>parseInt(localStorage.getItem('nm_mid')||'1'));
  const [connected, setConnected] = useState(false);
  const market = MARKET_VARIANTS.find(m=>m.id===marketId)||MARKET_VARIANTS[0];

  useEffect(()=>localStorage.setItem('nm_mid',String(marketId)),[marketId]);

  return (
    <>
      <MarketDetailPage
        market={market}
        connected={connected}
        setConnected={setConnected}
        onBack={()=>{}}
      />
      <MarketSelector current={marketId} onChange={setMarketId}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
