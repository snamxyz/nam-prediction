// ── Utils ─────────────────────────────────────────────────────────────────
const fmtVol = n => n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(1)}K`:`$${n.toFixed(0)}`;
const fmtLeft = iso => {
  const d = (new Date(iso)-Date.now())/1000;
  if (d<=0) return "Ended";
  const dy=Math.floor(d/86400), h=Math.floor((d%86400)/3600), m=Math.floor((d%3600)/60), s=Math.floor(d%60);
  if (dy>0) return `${dy}d ${h}h`;
  if (h>0) return `${h}h ${m}m`;
  return `${m}m ${s}s`;
};
function useCountdown(iso) {
  const [v,setV] = useState(()=>iso?fmtLeft(iso):"");
  useEffect(() => {
    if (!iso) return;
    const id = setInterval(()=>setV(fmtLeft(iso)),1000);
    return ()=>clearInterval(id);
  },[iso]);
  return v;
}

// ── Sparkline ─────────────────────────────────────────────────────────────
function Spark({ data, color, h=80 }) {
  if (!data||data.length<2) return null;
  const W=400;
  const vals = data.map(d=>d.y);
  const lo=Math.min(...vals)-3, hi=Math.max(...vals)+3;
  const px=i=>(i/(data.length-1))*W;
  const py=v=>h-((v-lo)/(hi-lo))*h;
  const path = data.map((d,i)=>`${i===0?'M':'L'}${px(i).toFixed(1)},${py(d.y).toFixed(1)}`).join(' ');
  const area = `${path} L${W},${h} L0,${h} Z`;
  const gid = `g${color.slice(1)}`;
  return (
    <svg viewBox={`0 0 ${W} ${h}`} preserveAspectRatio="none" style={{width:'100%',height:h,display:'block',overflow:'visible'}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${gid})`}/>
      <path d={path} stroke={color} strokeWidth="1.5" fill="none"/>
      {/* Last dot */}
      <circle cx={px(data.length-1).toFixed(1)} cy={py(data[data.length-1].y).toFixed(1)} r="3" fill={color}/>
    </svg>
  );
}

          </button>
        </div>
        {/* Slippage */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <span style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:700}}>Slippage</span>
          <div style={{display:'flex',gap:4}}>
            {[0.5,1,2,5].map(s=>(
              <button key={s} onClick={()=>setSlip(s)} style={{
                padding:'4px 8px',borderRadius:5,fontSize:11,transition:'all 0.12s',
                background:slip===s?`${T.accent}1e`:T.surfaceH, color:slip===s?T.accent:T.muted,
                border:`1px solid ${slip===s?`${T.accent}44`:'transparent'}`,
              }}>{s}%</button>
            ))}
          </div>
        </div>
        {/* Breakdown */}
        <div style={{background:T.surfaceH,borderRadius:8,padding:'13px 15px',marginBottom:16,border:`1px solid ${T.borderS}`}}>
          {[
            ['Avg price', `${(price*100).toFixed(1)}¢`],
            ['Est. shares', num>0?shares.toFixed(2):'—'],
          ].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:8}}>
              <span style={{color:T.muted}}>{k}</span>
              <span style={{color:T.text,fontFamily:T.mono}}>{v}</span>
            </div>
          ))}
          <div style={{height:1,background:T.borderS,margin:'8px 0'}}/>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
            <span style={{color:T.muted}}>If {side} wins</span>
            <span style={{color:num>0?sc:T.muted,fontWeight:600,fontFamily:T.mono}}>
              {num>0?`$${payout.toFixed(2)} (+${profit.toFixed(0)}%)`:'—'}
            </span>
          </div>
        </div>
        {/* CTA */}
        {!connected
          ? <button onClick={onConnect} style={{width:'100%',padding:'12px',borderRadius:9,background:T.accent,color:'#000',fontSize:13,fontWeight:700,letterSpacing:'0.01em'}}>
              Connect Wallet to Trade
            </button>
          : <button style={{width:'100%',padding:'12px',borderRadius:9,fontSize:13,fontWeight:700,letterSpacing:'0.01em',transition:'all 0.15s',
              background:num>0?sc:T.surfaceH, color:num>0?(side==='YES'?'#000':'#fff'):T.muted,
              cursor:num>0?'pointer':'not-allowed',
            }}>
              {num>0?`${mode} ${side} · $${num.toFixed(2)}`:'Enter an amount'}
            </button>
        }
        <p style={{textAlign:'center',fontSize:10,color:'rgba(76,78,104,0.55)',marginTop:10,lineHeight:1.5}}>
          Each trade requires a wallet signature.
        </p>
      </div>
    </div>
  );
}

// ── Vault Modal ───────────────────────────────────────────────────────────
function VaultModal({ mode, onClose, balance, setBalance }) {
  const [amt, setAmt] = useState('');
  const num = parseFloat(amt) || 0;
  const isDeposit = mode === 'deposit';
  const color = isDeposit ? T.yes : T.no;
  const max = isDeposit ? 9999 : parseFloat(balance);

  const handleSubmit = () => {
    if (num <= 0 || num > max) return;
    const next = isDeposit
      ? (parseFloat(balance) + num).toFixed(2)
      : (parseFloat(balance) - num).toFixed(2);
    setBalance(next);
    onClose();
  };

  return (
    <div style={{position:'fixed',inset:0,zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.6)',backdropFilter:'blur(6px)'}}
      onClick={onClose}>
      <div className="card" style={{width:360,padding:28,boxShadow:'0 24px 64px rgba(0,0,0,0.7)'}}
        onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <h3 style={{fontSize:15,fontWeight:600,color:T.text,letterSpacing:'-0.01em'}}>
            {isDeposit ? 'Deposit USDC' : 'Withdraw USDC'}
          </h3>
          <button onClick={onClose} style={{background:'none',color:T.muted,fontSize:18,lineHeight:1,padding:'2px 4px',transition:'color 0.12s'}}
            onMouseEnter={e=>e.currentTarget.style.color=T.text}
            onMouseLeave={e=>e.currentTarget.style.color=T.muted}>×</button>
        </div>

        {/* Balance chip */}
        <div style={{display:'flex',justifyContent:'space-between',padding:'10px 14px',borderRadius:8,background:T.surfaceH,border:`1px solid ${T.borderS}`,marginBottom:18}}>
          <span style={{fontSize:11,color:T.muted,textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:700}}>
            {isDeposit ? 'Wallet Balance' : 'Vault Balance'}
          </span>
          <span style={{fontFamily:T.mono,fontSize:12,color:T.text}}>
            {isDeposit ? '$2,400.00' : `$${balance}`}
          </span>
        </div>

        {/* Amount input */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:700,marginBottom:6}}>Amount</div>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:T.muted,fontSize:14,fontFamily:T.mono}}>$</span>
            <input type="number" min="0" max={max} placeholder="0.00" value={amt}
              onChange={e=>setAmt(e.target.value)}
              autoFocus
              style={{width:'100%',padding:'11px 14px 11px 26px',borderRadius:8,background:T.surfaceH,border:`1px solid ${num>max&&num>0?T.no:T.border}`,color:T.text,fontSize:15,fontFamily:T.mono}}/>
            <button onClick={()=>setAmt(String(max))}
              style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:10,fontWeight:700,color:color,background:`${color}18`,padding:'3px 7px',borderRadius:5,border:'none',cursor:'pointer',letterSpacing:'0.05em'}}>
              MAX
            </button>
          </div>
          {num > max && num > 0 && (
            <p style={{fontSize:11,color:T.no,marginTop:5}}>Exceeds available balance</p>
          )}
        </div>

        {/* Quick amounts */}
        <div style={{display:'flex',gap:5,marginBottom:22}}>
          {[10,50,100,500].map(q=>(
            <button key={q} onClick={()=>setAmt(String(q))}
              style={{flex:1,padding:'6px 0',borderRadius:6,fontSize:11,fontWeight:600,background:T.surfaceH,color:T.muted,border:`1px solid ${T.borderS}`,transition:'all 0.12s'}}
              onMouseEnter={e=>{e.currentTarget.style.color=T.text;e.currentTarget.style.borderColor=T.border;}}
              onMouseLeave={e=>{e.currentTarget.style.color=T.muted;e.currentTarget.style.borderColor=T.borderS;}}>
              ${q}
            </button>
          ))}
        </div>

        {/* CTA */}
        <button onClick={handleSubmit} disabled={num<=0||num>max}
          style={{width:'100%',padding:'12px',borderRadius:9,fontSize:13,fontWeight:700,letterSpacing:'0.01em',transition:'all 0.15s',
            background:num>0&&num<=max?color:T.surfaceH,
            color:num>0&&num<=max?(isDeposit?'#000':'#fff'):T.muted,
            cursor:num>0&&num<=max?'pointer':'not-allowed',
          }}>
          {isDeposit?'Deposit':'Withdraw'} {num>0?`$${num.toFixed(2)}`:''}
        </button>
        <p style={{textAlign:'center',fontSize:10,color:'rgba(76,78,104,0.55)',marginTop:10}}>
          {isDeposit?'Funds arrive in your vault instantly.':'Withdrawal sent to your connected wallet.'}
        </p>
      </div>
    </div>
  );
}

          <p style={{fontSize:11,color:T.muted,marginBottom:14}}>USDC available for trading</p>
          <div style={{fontFamily:T.mono,fontSize:30,color:T.yes,marginBottom:18,letterSpacing:'-0.02em'}}>${vaultBalance}</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setModal('deposit')} style={{flex:1,padding:'9px',borderRadius:8,background:T.accent,color:'#000',fontSize:13,fontWeight:700}}>Deposit</button>
            <button onClick={()=>setModal('withdraw')} style={{flex:1,padding:'9px',borderRadius:8,background:T.surfaceH,border:`1px solid ${T.border}`,color:T.text,fontSize:13,fontWeight:600}}>Withdraw</button>
          </div>
        </div>
        <div className="card" style={{padding:20}}>
          <h3 style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:4}}>Transaction History</h3>
          <p style={{fontSize:11,color:T.muted,marginBottom:14}}>Recent deposits and withdrawals</p>
          <div style={{fontSize:12,color:T.muted,textAlign:'center',padding:'24px 0',borderRadius:8,background:T.surfaceH}}>No transactions yet</div>
        </div>
      </div>

      {modal && (
        <VaultModal
          mode={modal}
          onClose={()=>setModal(null)}
          balance={vaultBalance}
          setBalance={setVaultBalance}
        />
      )}
    </div>
  );
}

// ── Tweaks ────────────────────────────────────────────────────────────────
const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "densityScale": 1,
  "showChartGrid": true,
  "probDisplaySize": "large",
  "accentVariant": "purple"
}/*EDITMODE-END*/;

function TweaksPanel({ show, tweaks, setTweaks }) {
  if (!show) return null;
  const set = (k,v) => {
    const next={...tweaks,[k]:v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  };
  return (
    <div style={{position:'fixed',bottom:20,right:20,zIndex:300,background:T.surfaceH,border:`1px solid ${T.border}`,borderRadius:12,padding:20,width:240,boxShadow:'0 12px 40px rgba(0,0,0,0.6)'}}>
      <p style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.09em',color:T.text,marginBottom:16}}>Tweaks</p>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:T.muted,marginBottom:7}}>Accent color</div>
        <div style={{display:'flex',gap:7}}>
          {[['green','#01d243'],['cyan','#00e5ff'],['purple','#a78bfa'],['amber','#f59e0b']].map(([n,c])=>(
            <button key={n} onClick={()=>set('accentVariant',n)} title={n}
              style={{width:22,height:22,borderRadius:'50%',background:c,border:tweaks.accentVariant===n?'2px solid white':'2px solid transparent',cursor:'pointer'}}/>
          ))}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:T.muted,marginBottom:7}}>Probability display</div>
        <div style={{display:'flex',gap:5}}>
          {[['large','Large'],['compact','Compact']].map(([v,l])=>(
            <button key={v} onClick={()=>set('probDisplaySize',v)} style={{flex:1,padding:'5px',borderRadius:6,fontSize:11,fontWeight:600,
              background:tweaks.probDisplaySize===v?`${T.accent}20`:T.surface,color:tweaks.probDisplaySize===v?T.accent:T.muted,
              border:`1px solid ${tweaks.probDisplaySize===v?`${T.accent}44`:'transparent'}`}}>{l}</button>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:11,color:T.muted,marginBottom:7}}>Chart gridlines</div>
        <div onClick={()=>set('showChartGrid',!tweaks.showChartGrid)} style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer'}}>
          <div style={{width:34,height:19,borderRadius:10,background:tweaks.showChartGrid?T.accent:T.surface,border:`1px solid ${tweaks.showChartGrid?T.accent:T.border}`,position:'relative',transition:'all 0.2s'}}>
            <div style={{position:'absolute',top:2,left:tweaks.showChartGrid?14:2,width:13,height:13,borderRadius:'50%',background:'white',transition:'left 0.2s'}}/>
          </div>
          <span style={{fontSize:11,color:tweaks.showChartGrid?T.text:T.muted}}>{tweaks.showChartGrid?'On':'Off'}</span>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const [page,setPage] = useState(()=>localStorage.getItem('nam_page')||'home');
  const [marketId,setMarketId] = useState(()=>parseInt(localStorage.getItem('nam_mid')||'1'));
  const [connected,setConnected] = useState(false);
  const [tweaks,setTweaks] = useState(TWEAK_DEFAULS);
  const [tweaksVisible,setTweaksVisible] = useState(false);

  useEffect(()=>{
    localStorage.setItem('nam_page',page);
    localStorage.setItem('nam_mid',String(marketId));
  },[page,marketId]);

  useEffect(()=>{
    const handler = e => {
      if (e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  const nav = id => { setMarketId(id); setPage('market'); };

  return (
    <>
      <Navbar page={page} setPage={setPage} connected={connected} setConnected={setConnected}/>
      {page==='home'&&<HomePage setPage={setPage} setMarketId={setMarketId}/>}
      {page==='market'&&<MarketDetailPage marketId={marketId} setPage={setPage} connected={connected} onConnect={()=>setConnected(true)}/>}
      {page==='portfolio'&&<PortfolioPage connected={connected} onConnect={()=>setConnected(true)} setPage={setPage} setMarketId={setMarketId}/>}
      <TweaksPanel show={tweaksVisible} tweaks={tweaks} setTweaks={setTweaks}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
